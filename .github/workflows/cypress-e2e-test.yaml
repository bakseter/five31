name: Cypress end-to-end tests

on:
  pull_request:
    branches: [master]

permissions:
  packages: write
  actions: read

env:
  IMAGE_NAME: 'ghcr.io/${{ github.repository }}/backend'

jobs:
  build-backend:
    name: 'Build backend'
    runs-on: ubuntu-latest
    concurrency:
      group: '${{ github.workflow }}-${{ github.ref }}-build-backend'
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend with cache and push to registry
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: 'backend'
          push: 'true'
          tags: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          cache-from: '${{ env.IMAGE_NAME }}:latest'
          cache-to: 'type=inline'

  cypress-e2e-tests:
    name: 'Cypress end-to-end tests'
    runs-on: ubuntu-latest
    concurrency:
      group: '${{ github.workflow }}-${{ github.ref }}-cypress-e2e-tests'
      cancel-in-progress: true
    needs: [build-backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Start backend
        run: |
          cd backend
          docker compose up &
        env:
          BACKEND_TAG: ${{ github.sha }}

      - name: Setup frontend dependencies
        uses: ./.github/actions/pnpm
        with:
          working-directory: 'frontend'

      - name: Force Cypress install, workaround
        run: |
          cd frontend
          pnpm cypress install

      - name: Run Cypress end-to-end tests
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7.1.9
        with:
          working-directory: 'frontend'
          install-command: 'pnpm i'
          build: 'pnpm build'
          start: 'pnpm start'
          wait-on: 'http://localhost:3000, http://localhost:8080/status'
          config: 'video=false'
          browser: 'firefox'
        env:
          NEXTAUTH_SECRET: 'very-secret-string-123'

      - name: Upload Cypress screenshots (only on failure)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: 'cypress-screenshots'
          path: 'frontend/cypress/screenshots'
