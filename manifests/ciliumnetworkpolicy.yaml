apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: five31-frontend
  namespace: five31
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: five31-frontend

  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/name: envoy
            gateway.envoyproxy.io/owning-gateway-name: home-bakseter-net
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus-blackbox-exporter
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homepage
            app.kubernetes.io/name: homepage
      toPorts:
        - ports:
            - port: '3000'
              protocol: TCP

  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: five31-backend
  namespace: five31
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: five31-backend

  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/name: envoy
            gateway.envoyproxy.io/owning-gateway-name: home-bakseter-net
      toPorts:
        - rules:
            http:
              - path: '/api/.*'
          ports:
            - port: '8080'
              protocol: TCP

  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: ANY
          rules:
            dns:
              - matchPattern: '*'

    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: five31-database
      toPorts:
        - rules:
            http: []
          ports:
            - port: '5432'
              protocol: TCP

    - toFQDNs:
        - matchName: 'authentik.bakseter.no'
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP


